<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECTO - Биржа ТГ Рекламы</title>
    <!-- Подключаем официальный скрипт Телеграма для шторки Mini App -->
    <script src="https://telegram.org"></script>
    <style>
        /* Строгий, дорогой темный стиль БигТеха */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #181818;
            color: #ffffff;
            margin: 0;
            padding: 16px;
            text-align: center;
        }
        .header {
            background: linear-gradient(135deg, #2c3e50, #000000);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        h1 { margin: 0; font-size: 24px; color: #00e676; letter-spacing: 1px; }
        .balance-box { font-size: 18px; margin-top: 10px; color: #b0bec5; }
        .catalog-title { text-align: left; font-size: 16px; margin: 20px 0 10px 4px; color: #00e676; text-transform: uppercase; }
        .channel-card {
            background-color: #242424;
            border: 1px solid #333333;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .channel-info h3 { margin: 0; font-size: 16px; color: #ffffff; }
        .channel-info p { margin: 4px 0 0 0; font-size: 13px; color: #90a4ae; }
        .buy-btn {
            background-color: #00e676;
            color: #000000;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .buy-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <!-- Шапка нашего маркетплейса рекламы RECTO -->
    <div class="header">
        <h1 id="user-greeting"> АЛИСА, Я ТЕБЯ ЛЮБЛЮ </h1>
        <div class="balance-box">💳 Баланс Казны: <strong style="color: #00e676;">500.0 USDT</strong></div>
    </div>

    <div class="catalog-title">📊 Доступные ТГ-Площадки:</div>

    <!-- Карточка Канала №1 -->
    <div class="channel-card">
        <div class="channel-info">
            <h3>📣 Новости Рязани</h3>
            <p>👥 15 000 подп. | 🎯 Охват: 45%</p>
        </div>
        <button class="buy-btn" onclick="buyPost('Новости Рязани', 10)">10$</button>
    </div>

    <!-- Карточка Канала №2 -->
    <div class="channel-card">
        <div class="channel-info">
            <h3>💡 ИТ-Блицкриг 2026</h3>
            <p>👥 45 000 sub. | 🎯 Охват: 60%</p>
        </div>
        <button class="buy-btn" onclick="buyPost('ИТ-Блицкриг', 35)">35$</button>
    </div>

    <script>
        // Инициализируем WebApp шлюз Дурова
        const tg = window.Telegram.WebApp;
        tg.expand(); // Принудительно разворачиваем шторку на весь экран смартфона!

        // Автоматически вытаскиваем реальное имя из Телеграма Алисы или тебя!
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById("user-greeting").innerText = `RECTO: ${tg.initDataUnsafe.user.first_name.toUpperCase()}`;
        }

        // Тестовая функция клика по кнопке цены
        function buyPost(channelName, price) {
            tg.showAlert(`Запрос b2b-сделки:\nПокупка поста в канале "${channelName}" за ${price}$ перенаправлена на сервер!`);
        }
    </script>
</body>
</html>
